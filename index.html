<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Triathlon Results</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d9488">

<!-- iOS home screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Triathlon Results">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1>Triathlon Results</h1>
</header>

<main id="listView" class="view">
  <div id="emptyState" class="empty-state hidden">
    <p class="empty-title">No races yet</p>
    <button id="emptyAddBtn" class="empty-cta">Tap here to add your first result &rarr;</button>
  </div>
  <ul id="raceList" class="race-list"></ul>
  <button id="addBtn" class="fab" aria-label="Add race">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</main>

<main id="detailView" class="view hidden">
  <div class="detail-topbar">
    <button id="backBtn" class="icon-btn-plain" aria-label="Back">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
  </div>
  <div id="detailContent"></div>
</main>

<main id="formView" class="view hidden">
  <form id="raceForm">
    <div class="detail-header form-title-row">
      <h2 id="formTitle">New Race</h2>
    </div>

    <div class="field">
      <span>Photo</span>
      <label id="photoPicker" for="photoInput" class="photo-picker">
        <input type="file" id="photoInput" accept="image/*" capture="environment" class="visually-hidden">
        <img id="photoPreview" class="photo-preview hidden" alt="Preview">
        <div class="photo-picker-empty">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a2 2 0 0 1 2-2h1.5l1-1.5h7l1 1.5H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.5"/></svg>
          <span>Add photo</span>
        </div>
        <div class="photo-picker-edit-badge">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </div>
      </label>
    </div>

    <label class="field">
      <span>Race name</span>
      <input type="text" id="nameInput" required placeholder="e.g. Ironman 70.3">
    </label>

    <label class="field">
      <span>Type</span>
      <select id="typeInput"></select>
    </label>

    <label class="field">
      <span>Date</span>
      <input type="date" id="dateInput">
    </label>

    <label class="field">
      <span>Result (place / field size)</span>
      <div class="result-input">
        <input type="number" id="placeInput" min="1" inputmode="numeric" placeholder="88">
        <span>/</span>
        <input type="number" id="fieldSizeInput" min="1" inputmode="numeric" placeholder="233">
      </div>
    </label>

    <fieldset class="segment">
      <legend>Swim</legend>
      <label class="subfield">
        <span>Distance (m)</span>
        <input type="number" id="swimDist" min="0" step="1" inputmode="numeric">
      </label>
      <div class="time-input" data-target="swimTime">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Transition 1 (T1)</legend>
      <div class="time-input" data-target="t1Time">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Bike</legend>
      <label class="subfield">
        <span>Distance (km)</span>
        <input type="number" id="bikeDist" min="0" step="0.1" inputmode="decimal">
      </label>
      <div class="time-input" data-target="bikeTime">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Transition 2 (T2)</legend>
      <div class="time-input" data-target="t2Time">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Run</legend>
      <label class="subfield">
        <span>Distance (km)</span>
        <input type="number" id="runDist" min="0" step="0.1" inputmode="decimal">
      </label>
      <div class="time-input" data-target="runTime">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <div class="total-row">
      <span>Total time</span>
      <strong id="totalTimeDisplay">00:00:00</strong>
    </div>

    <div class="form-actions">
      <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</main>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
